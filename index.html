<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailySpend - 記帳神器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header class="dashboard">
            <div class="summary-card">
                <div id="todayDate" class="today-date">--年--月--日 (---)</div>
                
                <p style="margin-top: 10px; opacity: 0.9;">今日總支出</p>
                <h2 id="todayTotal" style="margin: 0; font-size: 1.8rem;">$0</h2>
                
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.3); margin: 15px 0;">
                
                <p id="monthLabel">本月支出</p>
                <h1 id="monthTotal" style="margin-top: 5px;">$0.00</h1>
            </div>
        </header>

        <section class="input-section">
            <form id="expenseForm">
                <div class="input-group">
                    <input type="number" id="amount" placeholder="金額" required>
                    <select id="category">
                        <option value="food">飲食</option>
                        <option value="transport">交通</option>
                        <option value="shopping">購物</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <button type="submit" class="add-btn">新增記錄</button>
            </form>
        </section>

        <nav class="tab-menu">
            <button class="tab-link active" onclick="switchTab('list')">最近記錄</button>
            <button class="tab-link" onclick="switchTab('settings')">固定使費設定</button>
        </nav>

        <main class="content-area">
            <div id="listView">
                <ul class="expense-list" id="expenseList">
                    <li class="empty-msg">今日未有使費，繼續保持！</li>
                </ul>
            </div>

            <div id="settingsView" style="display: none; padding: 20px;">
                <h3>每月自動扣款設定</h3>
                <form id="recurringForm" style="margin-bottom: 20px;">
                    <input type="text" id="recName" placeholder="項目 (如:房租)" required style="width: 100%; margin-bottom: 10px;">
                    <div class="input-group">
                        <input type="number" id="recDay" placeholder="日期 (1-31)" min="1" max="31" required>
                        <input type="number" id="recAmount" placeholder="金額" required>
                    </div>
                    <button type="submit" class="add-btn" style="margin-top:10px; background: #2ecc71;">新增固定支出</button>
                </form>
                <hr>
                <ul id="recurringList" style="list-style: none; padding: 0;"></ul>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
