<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的理財助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h2 id="currentDateDisplay">2026年4月9日 (週四)</h2>
        <div class="stats-container">
            <div class="stat-item">
                <small>今日支出</small>
                <div id="todayTotal" class="amount">$0</div>
            </div>
            <div class="stat-item">
                <small id="monthLabel">4月總支出</small>
                <div id="monthTotal" class="amount">$0</div>
            </div>
        </div>
    </header>

    <nav class="tab-menu">
        <button class="tab-link active" onclick="switchTab('list')">最近記錄</button>
        <button class="tab-link" onclick="switchTab('search')">搜尋記錄</button>
        <button class="tab-link" onclick="switchTab('settings')">固定支出</button>
    </nav>

    <main class="content-area">
        
        <div id="listView">
            <section class="input-section">
                <form id="expenseForm">
                    <div class="input-group">
                        <input type="number" id="amount" placeholder="金額" required inputmode="decimal">
                        <select id="category">
                            <option value="飲食">飲食</option>
                            <option value="交通">交通</option>
                            <option value="購物">購物</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <input type="date" id="inputDate" required>
                        <input type="time" id="inputTime" required>
                    </div>

                    <input type="text" id="note" list="noteHistory" placeholder="備註 (選填)" autocomplete="off">
                    <datalist id="noteHistory"></datalist>
                    
                    <button type="submit" class="add-btn">新增記錄</button>
                </form>
            </section>

            <ul id="expenseList" class="expense-list">
                </ul>
        </div>

        <div id="searchView" style="display: none; padding: 15px;">
            <h3>搜尋記錄</h3>
            <div class="input-group">
                <input type="date" id="searchFrom">
                <span style="align-self: center;">至</span>
                <input type="date" id="searchTo">
            </div>

            <div class="input-group">
                <select id="searchCategory">
                    <option value="all">所有類別</option>
                    <option value="飲食">飲食</option>
                    <option value="交通">交通</option>
                    <option value="購物">購物</option>
                    <option value="其他">其他</option>
                </select>
                <input type="text" id="searchNote" placeholder="關鍵字搜尋...">
            </div>

            <button onclick="performSearch()" class="add-btn" style="background: #34495e;">執行搜尋</button>
            
            <div id="searchResultSummary" class="summary-text"></div>
            <ul id="searchResultList" class="expense-list"></ul>
            
            <div id="deleteAllContainer" style="display: none; margin-top: 20px;">
                <button onclick="deleteAllSearchResults()" class="add-btn" style="background: var(--accent); box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);">
                    刪除以上所有記錄
                </button>
                <p style="text-align: center; color: #888; font-size: 0.8rem; margin-top: 8px;">
                    注意：此操作無法復原
                </p>
            </div>
            
        </div>

        <div id="settingsView" style="display: none; padding: 15px;">
            <h3>每月固定支出設定</h3>
            <section class="input-section" style="background: #fdfdfd; border: 1px dashed #ccc;">
                <form id="recurringForm">
                    <div class="input-group">
                        <input type="number" id="recAmount" placeholder="金額" required>
                        <select id="recCategory">
                            <option value="租金">租金</option>
                            <option value="保險">保險</option>
                            <option value="電話費">電話費</option>
                            <option value="訂閱服務">訂閱服務</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="recDay" style="font-size: 0.9rem; align-self: center;">每月扣款日：</label>
                        <input type="number" id="recDay" min="1" max="31" placeholder="1-31" required>
                    </div>
                    <input type="text" id="recNote" placeholder="項目備註 (例如：Netflix)">
                    <button type="submit" class="add-btn" style="background: #27ae60;">新增固定支出</button>
                </form>
            </section>

            <h4 style="margin-top: 20px;">已設定的固定支出</h4>
            <ul id="recurringList" class="expense-list">
                </ul>
        </div>

    </main>

    <div id="limitDisplay" style="text-align:center; font-size:10px; color:#ccc; padding-bottom:10px;">
        目前顯示限額: 15
    </div>

    <script src="script.js"></script>
</body>
</html>
