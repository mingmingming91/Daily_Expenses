<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailySpend - 記帳神器</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="app-container">
        <header class="dashboard">
            <div class="summary-card">
                <p>本月支出</p>
                <h1 id="monthTotal">$0.00</h1>
                <div class="stats-row">
                    <span>本週: <b id="weekTotal">$0</b></span>
                    <span>固定支出: <b id="recurringTotal">$0</b></span>
                </div>
            </div>
        </header>

        <section class="input-section">
            <form id="expenseForm">
                <div class="input-group">
                    <input type="number" id="amount" placeholder="金額" required>
                    <select id="category">
                        <option value="food">飲食</option>
                        <option value="transport">交通</option>
                        <option value="shopping">購物</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <button type="submit" class="add-btn">新增記錄</button>
            </form>
        </section>

        <nav class="tab-menu">
            <button class="tab-link active">最近記錄</button>
            <button class="tab-link">固定使費</button>
        </nav>

        <main class="content-area">
            <ul class="expense-list" id="expenseList">
                <li class="empty-msg">今日未有使費，繼續保持！</li>
            </ul>
        </main>
    </div>
<script src="script.js"></script>
</body>
</html>
